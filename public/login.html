<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preludio | Login e Cadastro</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=Delius&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="./assets/css/styles.css">
</head>
<body class="site-body text-light">
  <header class="site-header border-bottom border-warning">
    <div class="container py-3">
      <div class="row align-items-center g-3">
        <div class="col-12 col-md-3 text-center text-md-start">
          <img src="./assets/.img/Prelúdio-logo.png" alt="Logo da Preludio" class="img-fluid rounded border border-dark logo-site">
        </div>
        <div class="col-12 col-md-9 text-center text-md-end">
          <h1 class="titulo-principal mb-2">Acesso do Usuario</h1>
          <p id="user-greeting" class="mb-2 text-warning small"></p>
          <nav class="d-flex justify-content-center justify-content-md-end gap-2 flex-wrap" aria-label="Menu principal">
            <a class="btn btn-dark btn-sm border border-warning text-warning" href="index.html">Inicio</a>
            <a id="nav-admin-item" class="btn btn-dark btn-sm border border-warning text-warning d-none" href="cadastro_itens.html">Cadastro</a>
            <a id="nav-favoritos-item" class="btn btn-dark btn-sm border border-warning text-warning d-none" href="favoritos.html">Favoritos</a>
            <a id="auth-action-link" class="btn btn-warning btn-sm fw-semibold" href="login.html">Login</a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div id="auth-alert" class="mb-3"></div>
    <div class="row g-4">
      <div class="col-12 col-lg-6">
        <section class="detalhe-bloco p-4 rounded-4 h-100">
          <h2 class="h4 mb-3">Login</h2>
          <form id="login-form" class="d-flex flex-column gap-3">
            <div>
              <label for="login-usuario" class="form-label">Login</label>
              <input id="login-usuario" class="form-control" type="text" required>
            </div>
            <div>
              <label for="login-senha" class="form-label">Senha</label>
              <input id="login-senha" class="form-control" type="password" required>
            </div>
            <button class="btn btn-warning fw-semibold" type="submit">Entrar</button>
          </form>
        </section>
      </div>

      <div class="col-12 col-lg-6">
        <section class="detalhe-bloco p-4 rounded-4 h-100">
          <h2 class="h4 mb-3">Novo Cadastro</h2>
          <form id="register-form" class="d-flex flex-column gap-3">
            <div>
              <label for="register-nome" class="form-label">Nome completo</label>
              <input id="register-nome" class="form-control" type="text" required>
            </div>
            <div>
              <label for="register-email" class="form-label">Email</label>
              <input id="register-email" class="form-control" type="email" required>
            </div>
            <div>
              <label for="register-usuario" class="form-label">Login</label>
              <input id="register-usuario" class="form-control" type="text" required>
            </div>
            <div>
              <label for="register-senha" class="form-label">Senha</label>
              <input id="register-senha" class="form-control" type="password" required>
            </div>
            <button class="btn btn-outline-warning fw-semibold" type="submit">Cadastrar</button>
          </form>
        </section>
      </div>
    </div>
  </main>

  <script src="./assets/js/app.js"></script>
  <script src="./assets/js/login.js"></script>
</body>
</html>
