<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Preludio | Cadastro de Itens</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Birthstone&family=Delius&display=swap" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" crossorigin="anonymous">
  <link rel="stylesheet" href="assets/css/styles.css">
</head>
<body class="site-body text-light">
  <header class="site-header border-bottom border-warning">
    <div class="container py-3">
      <div class="row align-items-center g-3">
        <div class="col-12 col-md-3 text-center text-md-start">
          <img src="assets/.img/Prelúdio-logo.png" alt="Logo da Preludio" class="img-fluid rounded border border-dark logo-site">
        </div>
        <div class="col-12 col-md-9 text-center text-md-end">
          <h1 class="titulo-principal mb-2">CRUD de Cursos</h1>
          <p id="user-greeting" class="mb-2 text-warning small"></p>
          <nav class="d-flex justify-content-center justify-content-md-end gap-2 flex-wrap" aria-label="Menu principal">
            <a class="btn btn-dark btn-sm border border-warning text-warning" href="index.html">Inicio</a>
            <a id="nav-admin-item" class="btn btn-dark btn-sm border border-warning text-warning d-none" href="cadastro_itens.html">Cadastro</a>
            <a id="nav-favoritos-item" class="btn btn-dark btn-sm border border-warning text-warning d-none" href="favoritos.html">Favoritos</a>
            <a id="auth-action-link" class="btn btn-warning btn-sm fw-semibold" href="login.html">Login</a>
          </nav>
        </div>
      </div>
    </div>
  </header>

  <main class="container py-5">
    <div id="crud-alert" class="mb-3"></div>

    <section class="detalhe-bloco p-4 rounded-4 mb-4">
      <h2 class="h4 mb-3">Cadastro e Edicao</h2>
      <form id="curso-form" class="row g-3">
        <input id="curso-id" type="hidden">

        <div class="col-12 col-md-6">
          <label for="titulo" class="form-label">Titulo</label>
          <input id="titulo" class="form-control" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="categoria" class="form-label">Categoria</label>
          <input id="categoria" class="form-control" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="imagem" class="form-label">URL da imagem</label>
          <input id="imagem" class="form-control" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="preco" class="form-label">Preco</label>
          <input id="preco" class="form-control" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="nivel" class="form-label">Nivel</label>
          <input id="nivel" class="form-control" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="modalidade" class="form-label">Modalidade</label>
          <input id="modalidade" class="form-control" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="duracao" class="form-label">Duracao</label>
          <input id="duracao" class="form-control" required>
        </div>
        <div class="col-12 col-md-6">
          <label for="instrutor" class="form-label">Instrutor</label>
          <input id="instrutor" class="form-control" required>
        </div>
        <div class="col-12">
          <label for="descricaoCurta" class="form-label">Descricao curta</label>
          <textarea id="descricaoCurta" class="form-control" rows="2" required></textarea>
        </div>
        <div class="col-12">
          <label for="descricaoCompleta" class="form-label">Descricao completa</label>
          <textarea id="descricaoCompleta" class="form-control" rows="3" required></textarea>
        </div>
        <div class="col-12 col-md-8">
          <label for="tags" class="form-label">Tags (separadas por virgula)</label>
          <input id="tags" class="form-control" placeholder="ritmo, leitura, iniciante">
        </div>
        <div class="col-12 col-md-4 d-flex align-items-center">
          <div class="form-check mt-4">
            <input id="destaque" class="form-check-input" type="checkbox">
            <label for="destaque" class="form-check-label">Item em destaque</label>
          </div>
        </div>

        <div class="col-12 d-flex flex-wrap gap-2">
          <button class="btn btn-warning fw-semibold" type="submit">Salvar</button>
          <button id="btn-cancelar" class="btn btn-outline-warning" type="button">Cancelar edicao</button>
        </div>
      </form>
    </section>

    <section class="detalhe-bloco p-4 rounded-4">
      <h2 class="h4 mb-3">Itens Cadastrados</h2>
      <div class="table-responsive">
        <table class="table table-dark table-striped align-middle">
          <thead>
            <tr>
              <th>ID</th>
              <th>Titulo</th>
              <th>Categoria</th>
              <th>Preco</th>
              <th>Acoes</th>
            </tr>
          </thead>
          <tbody id="crud-table-body"></tbody>
        </table>
      </div>
    </section>
  </main>

  <script src="assets/js/app.js"></script>
  <script src="assets/js/cadastro_itens.js"></script>
</body>
</html>
